<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, shrink-to-fit=no">
    <title>Documentation</title>
    <link rel="stylesheet" href="css/util.css">
    <link rel="stylesheet" href="css/docs.css">
    <link rel="stylesheet" href="css/font-awesome.css">
</head>

<body>

    <div class="loading">
        <i class="fa fa-spinner fa-spin fa-5x fa-fw"></i>
    </div>

    <div class="grid-x">
        <div class="side cell -frame -8 -5_medium -3_large -show_large -fixed -top-left -hide_print">
            <div class="grid-y -overflow -nowrap">
                <div class="close cell -auto -hide_large">
                    <div class="grid-x -right">
                        <div class="cell -auto">
                            <button onclick="docs.toggleSidebar()" class="close-button"><i class="fa fa-times fa-2x"></i></button>
                        </div>
                    </div>
                </div>
                <div class="cell -auto">
                    <div class="grid-x -middle">
                        <div class="cell -fill">
                            <input class="search-input" data-index="1" type="text">
                        </div>
                        <div class="cell -auto">
                            <button class="search-button" data-index="1"><i class="fa fa-search fa-lg"></i></button>
                        </div>
                    </div>
                </div>
                <div class="cell -auto">
                    <div class="grid-x">
                        <div class="cell -auto -overflow sidebar">
                            <!--SIDE BAR ITEMS-->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="main cell -fill -push-3_large -push-0_print">
            <div class="grid-y -frame">
                <div class="cell -auto -overflow -hide_print">
                    <div class="grid-x -overflow">
                        <div class="cell -fill -overflow">
                            <div class="nav grid-x -nowrap -overflow">
                                <div class="nav-item cell -auto">
                                    <button class="menu-button -hide_large" onclick="docs.toggleSidebar()"><i class="fa fa-bars fa-lg"></i></button>
                                </div>
                                <div class="cell -fill -overflow">
                                    <div class="menu grid-x -nowrap">
                                        <div class="nav-item cell -auto"><button onclick="docs.mapAction(true)"><i class="fa fa-home fa-lg"></i></button></div>
                                        <div class="nav-item cell -auto"><button onclick="window.print()"><i class="fa fa-print fa-lg"></i></button></div>
                                        <div class="nav-item cell -auto"><button onclick="docs.exportMap()"><i class="fa fa-download fa-lg"></i></button></div>
                                        <div class="zoom nav-item cell -auto">
                                            <div class="grid-x -nowrap">
                                                <div class="nav-item cell -auto"><button onclick="docs.zoomOut()"><i class="fa fa-search-minus fa-lg"></i></button></div>
                                                <div class="nav-item cell -auto"><button onclick="docs.zoomBase()" class="zoom-base">Zoom</button></div>
                                                <div class="nav-item cell -auto"><button onclick="docs.zoomIn()"><i class="fa fa-search-plus fa-lg"></i></button></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="more nav-item cell -auto -overflow -relative">
                                    <button><i class="fa fa-ellipsis-v fa-lg"></i></button>
                                    <div class="more-menu -absolute -bottom-right-outside"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="cell -fill">
                    <div class="content">
                        <div class="home grid-x -center">
                            <div class="cell -12 -8_medium -6_large">
                                <div class="grid-x -center -middle">
                                    <div class="cell -fill">
                                        <input class="search-input" data-index="2" type="text">
                                    </div>
                                    <div class="cell -auto">
                                        <button class="search-button" data-index="2"><i class="fa fa-search fa-2x"></i></button>
                                    </div>
                                </div>
                                <div class="map grid-x -center">
                                    <div class="map-list cell -fill">
                                        <!--MAP LIST-->
                                    </div>
                                </div>
                                <div class="search grid-x">
                                    <div class="search-result cell -fill">
                                        <!--SEARCH RESULTS-->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/docs.js"></script>
    <script>
        docs.init();
    </script>
</body>

</html>
